<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DOM结构诊断</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        pre { background: white; padding: 15px; border-radius: 5px; overflow-x: auto; }
        h1, h2 { color: #333; }
        .warning { color: #e74c3c; font-weight: bold; }
        .success { color: #27ae60; font-weight: bold; }
        .info { color: #3498db; }
    </style>
</head>
<body>
    <h1>ChatBI DOM结构诊断</h1>

    <h2>1. 检查HTML结构</h2>
    <div id="structure-check"></div>

    <h2>2. 检查CSS样式</h2>
    <div id="css-check"></div>

    <h2>3. 检查元素位置</h2>
    <div id="position-check"></div>

    <h2>4. 完整DOM树</h2>
    <pre id="dom-tree"></pre>

    <script>
        // 检查HTML结构
        function checkStructure() {
            const container = document.querySelector('.container');
            const main = container ? container.querySelector('.main') : null;
            const chatArea = main ? main.querySelector('.chat-area') : null;
            const hotQuestionsPanel = main ? main.querySelector('.hot-questions-panel') : null;

            const output = [];

            output.push('<p><strong>容器结构：</strong></p>');
            output.push(`<p>.container 存在: ${container ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);
            output.push(`<p>.main 存在: ${main ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);
            output.push(`<p>.chat-area 存在: ${chatArea ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);
            output.push(`<p>.hot-questions-panel 存在: ${hotQuestionsPanel ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);

            if (container && main && chatArea && hotQuestionsPanel) {
                output.push('<p><span class="success">✓ 所有关键元素都存在</span></p>');
            } else {
                output.push('<p><span class="warning">✗ 缺少关键元素</span></p>');
            }

            output.push('<p><strong>嵌套关系：</strong></p>');
            if (main && chatArea && hotQuestionsPanel) {
                const chatAreaInMain = main.contains(chatArea);
                const panelInMain = main.contains(hotQuestionsPanel);
                const areSiblings = chatArea.parentElement === hotQuestionsPanel.parentElement;

                output.push(`<p>.chat-area 在 .main 内部: ${chatAreaInMain ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);
                output.push(`<p>.hot-questions-panel 在 .main 内部: ${panelInMain ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);
                output.push(`<p>.chat-area 和 .hot-questions-panel 是兄弟元素: ${areSiblings ? '<span class="success">✓</span>' : '<span class="warning">✗</span>'}</p>`);
            }

            document.getElementById('structure-check').innerHTML = output.join('');
        }

        // 检查CSS样式
        function checkCSS() {
            const main = document.querySelector('.main');
            const chatArea = document.querySelector('.chat-area');
            const hotQuestionsPanel = document.querySelector('.hot-questions-panel');

            const output = [];

            if (main) {
                const mainStyles = getComputedStyle(main);
                output.push('<p><strong>.main 样式：</strong></p>');
                output.push(`<pre>display: ${mainStyles.display}<br>flex-direction: ${mainStyles.flexDirection}<br>background: ${mainStyles.background}</pre>`);
            }

            if (chatArea) {
                const chatStyles = getComputedStyle(chatArea);
                output.push('<p><strong>.chat-area 样式：</strong></p>');
                output.push(`<pre>display: ${chatStyles.display}<br>flex-direction: ${chatStyles.flexDirection}<br>max-width: ${chatStyles.maxWidth}<br>flex: ${chatStyles.flex}</pre>`);
            }

            if (hotQuestionsPanel) {
                const panelStyles = getComputedStyle(hotQuestionsPanel);
                output.push('<p><strong>.hot-questions-panel 样式：</strong></p>');
                output.push(`<pre>display: ${panelStyles.display}<br>flex-direction: ${panelStyles.flexDirection}<br>width: ${panelStyles.width}<br>flex-shrink: ${panelStyles.flexShrink}</pre>`);
            }

            document.getElementById('css-check').innerHTML = output.join('');
        }

        // 检查元素位置
        function checkPosition() {
            const chatArea = document.querySelector('.chat-area');
            const hotQuestionsPanel = document.querySelector('.hot-questions-panel');

            const output = [];

            if (chatArea && hotQuestionsPanel) {
                const chatRect = chatArea.getBoundingClientRect();
                const panelRect = hotQuestionsPanel.getBoundingClientRect();

                output.push('<p><strong>.chat-area 位置：</strong></p>');
                output.push(`<pre>left: ${chatRect.left}px<br>top: ${chatRect.top}px<br>right: ${chatRect.right}px<br>bottom: ${chatRect.bottom}px<br>width: ${chatRect.width}px<br>height: ${chatRect.height}px</pre>`);

                output.push('<p><strong>.hot-questions-panel 位置：</strong></p>');
                output.push(`<pre>left: ${panelRect.left}px<br>top: ${panelRect.top}px<br>right: ${panelRect.right}px<br>bottom: ${panelRect.bottom}px<br>width: ${panelRect.width}px<br>height: ${panelRect.height}px</pre>`);

                output.push('<p><strong>相对位置：</strong></p>');
                if (panelRect.left > chatRect.right) {
                    output.push('<p><span class="success">✓ .hot-questions-panel 在 .chat-area 的右侧（布局正确）</span></p>');
                } else if (panelRect.top >= chatRect.bottom) {
                    output.push('<p><span class="warning">✗ .hot-questions-panel 在 .chat-area 的下方（布局错误）</span></p>');
                } else {
                    output.push(`<p><span class="info">? 其他位置关系</span></p>`);
                }
            }

            document.getElementById('position-check').innerHTML = output.join('');
        }

        // 显示DOM树
        function showDomTree() {
            const container = document.querySelector('.container');
            if (container) {
                let html = formatDomTree(container, 0);
                document.getElementById('dom-tree').textContent = html;
            }
        }

        // 格式化DOM树
        function formatDomTree(element, depth) {
            const indent = '  '.repeat(depth);
            let text = indent + '<' + element.tagName.toLowerCase();

            if (element.id) {
                text += ` id="${element.id}"`;
            }
            if (element.className) {
                text += ` class="${element.className}"`;
            }

            text += '>\n';

            for (let child of element.children) {
                text += formatDomTree(child, depth + 1);
            }

            text += indent + '</' + element.tagName.toLowerCase() + '>\n';
            return text;
        }

        // 页面加载后执行所有检查
        window.addEventListener('load', () => {
            checkStructure();
            checkCSS();
            checkPosition();
            showDomTree();
        });
    </script>
</body>
</html>
