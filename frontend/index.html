<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoBot AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 左侧边栏 */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #6366f1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-btn {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #4f46e5;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .session-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            background: #f3f4f6;
        }

        .session-item.active {
            background: #eef2ff;
        }

        .session-info {
            flex: 1;
            min-width: 0;
        }

        .session-title {
            font-size: 14px;
            color: #1f2937;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-time {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 4px;
        }

        .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            transition: opacity 0.2s, color 0.2s;
        }

        .session-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        /* 主聊天区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            background: #ffffff;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            max-width: 800px;
            margin: 0 auto 20px;
            display: flex;
            gap: 12px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #6366f1;
            color: white;
            order: 2;
        }

        .message.assistant .message-avatar {
            background: #10b981;
            color: white;
            order: 1;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #6366f1;
            color: white;
            order: 1;
            border-top-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            order: 2;
            border-top-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message-content pre {
            background: #1f2937;
            color: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background: #f3f4f6;
            color: #1f2937;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 14px;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        /* 输入区域 */
        .input-container {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            background: #ffffff;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 16px 52px 16px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
        }

        .message-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .send-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 36px;
            height: 36px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, opacity 0.2s;
        }

        .send-btn:hover {
            background: #4f46e5;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🤖 NanoBot</div>
            <button class="new-chat-btn" onclick="createNewChat()">
                <span>+</span> 新建会话
            </button>
        </div>
        <div class="session-list" id="sessionList">
            <!-- 会话列表将在这里动态加载 -->
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header">
            <div class="chat-title" id="chatTitle">NanoBot AI Assistant</div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <div class="empty-state-text">开始新的对话吧</div>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    class="message-input" 
                    id="messageInput" 
                    placeholder="输入消息..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5088/api';
        let currentSessionId = null;
        let sessions = [];

        // 页面加载时初始化
        window.onload = function() {
            loadSessions();
        };

        // 加载会话列表
        async function loadSessions() {
            try {
                const response = await fetch(`${API_BASE}/sessions`);
                const data = await response.json();
                sessions = data.sessions || [];
                renderSessionList();
            } catch (error) {
                console.error('加载会话列表失败:', error);
            }
        }

        // 渲染会话列表
        function renderSessionList() {
            const list = document.getElementById('sessionList');
            list.innerHTML = '';

            sessions.forEach(session => {
                const item = document.createElement('div');
                item.className = `session-item ${currentSessionId === session.key ? 'active' : ''}`;
                item.onclick = () => loadSession(session.key);

                const title = session.key.split(':')[1] || '默认会话';
                const time = new Date(session.updated_at).toLocaleString('zh-CN');

                item.innerHTML = `
                    <div class="session-info">
                        <div class="session-title">${title}</div>
                        <div class="session-time">${time}</div>
                    </div>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteSession('${session.key}')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                `;

                list.appendChild(item);
            });
        }

        // 创建新会话
        function createNewChat() {
            currentSessionId = `web:${Date.now()}`;
            document.getElementById('chatTitle').textContent = '新对话';
            document.getElementById('messagesContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div class="empty-state-text">开始新的对话吧</div>
                </div>
            `;
            document.getElementById('messageInput').focus();
            renderSessionList();
        }

        // 加载会话历史
        async function loadSession(sessionId) {
            currentSessionId = sessionId;
            const title = sessionId.split(':')[1] || '会话';
            document.getElementById('chatTitle').textContent = title;

            try {
                const response = await fetch(`${API_BASE}/sessions/${sessionId.replace(':', '_')}`);
                const data = await response.json();
                
                const container = document.getElementById('messagesContainer');
                container.innerHTML = '';

                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.role === 'user' || msg.role === 'assistant') {
                            addMessageToUI(msg.role, msg.content);
                        }
                    });
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <div class="empty-state-text">开始新的对话吧</div>
                        </div>
                    `;
                }

                renderSessionList();
                scrollToBottom();
            } catch (error) {
                console.error('加载会话失败:', error);
            }
        }

        // 删除会话
        async function deleteSession(sessionId) {
            if (!confirm('确定要删除这个会话吗?')) {
                return;
            }

            try {
                await fetch(`${API_BASE}/sessions/${sessionId.replace(':', '_')}`, {
                    method: 'DELETE'
                });

                if (currentSessionId === sessionId) {
                    currentSessionId = null;
                    document.getElementById('chatTitle').textContent = 'NanoBot AI Assistant';
                    document.getElementById('messagesContainer').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <div class="empty-state-text">开始新的对话吧</div>
                        </div>
                    `;
                }

                await loadSessions();
            } catch (error) {
                console.error('删除会话失败:', error);
                alert('删除会话失败');
            }
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            // 如果没有当前会话,创建一个新会话
            if (!currentSessionId) {
                createNewChat();
            }

            // 添加用户消息到UI
            addMessageToUI('user', message);
            input.value = '';
            input.style.height = 'auto';

            // 显示加载动画
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loadingMessage';
            loadingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            document.getElementById('messagesContainer').appendChild(loadingDiv);
            scrollToBottom();

            try {
                const response = await fetch(`${API_BASE}/agent/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSessionId
                    })
                });

                const data = await response.json();

                // 移除加载动画
                const loadingMsg = document.getElementById('loadingMessage');
                if (loadingMsg) {
                    loadingMsg.remove();
                }

                // 添加助手回复
                if (data.response) {
                    addMessageToUI('assistant', data.response);
                }

                // 刷新会话列表
                await loadSessions();

            } catch (error) {
                console.error('发送消息失败:', error);
                const loadingMsg = document.getElementById('loadingMessage');
                if (loadingMsg) {
                    loadingMsg.remove();
                }
                addMessageToUI('assistant', '抱歉,发送消息时出错。请检查服务器是否正常运行。');
            }

            scrollToBottom();
        }

        // 添加消息到UI
        function addMessageToUI(role, content) {
            const container = document.getElementById('messagesContainer');
            
            // 移除空状态
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = role === 'user' ? '👤' : '🤖';
            
            // 简单的markdown处理
            let formattedContent = content
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${formattedContent}</div>
            `;

            container.appendChild(messageDiv);
            scrollToBottom();
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 处理键盘事件
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 自动调整输入框高度
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }
    </script>
</body>
</html>
