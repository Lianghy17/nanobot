<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBI - 智能数据查询助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 90%; max-width: 900px; height: 90vh; background: white; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .scene-selection { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; padding: 40px; }
        .scene-selection h1 { font-size: 36px; color: #333; margin-bottom: 10px; }
        .scene-selection p { color: #666; margin-bottom: 40px; }
        .scene-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
        .scene-card { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 15px; padding: 30px; cursor: pointer; color: white; transition: transform 0.3s; }
        .scene-card:hover { transform: translateY(-5px); }
        .scene-card h3 { font-size: 20px; margin-bottom: 10px; }
        .scene-card .code { background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 5px; font-size: 12px; display: inline-block; margin-top: 10px; }
        .chat-container { display: none; flex-direction: column; height: 100%; }
        .chat-header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px 30px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-size: 20px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
        .message { margin-bottom: 15px; }
        .message.user { text-align: right; }
        .message-content { display: inline-block; max-width: 70%; padding: 12px 18px; border-radius: 18px; line-height: 1.5; }
        .message.user .message-content { background: #667eea; color: white; }
        .message.assistant .message-content { background: white; color: #333; }
        .tool-call { background: #e3f2fd; padding: 10px; border-radius: 8px; margin: 5px 0; font-size: 13px; }
        .chat-input-container { padding: 20px; background: white; border-top: 1px solid #e0e0e0; }
        .chat-input-wrapper { display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px 18px; border: 2px solid #e0e0e0; border-radius: 25px; outline: none; transition: border-color 0.3s; }
        .chat-input:focus { border-color: #667eea; }
        .send-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; width: 50px; height: 50px; border-radius: 50px; cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        .send-btn:hover { transform: scale(1.05); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="sceneSelection" class="scene-selection">
            <h1>ChatBI</h1>
            <p>请选择一个场景开始对话</p>
            <div class="scene-grid" id="sceneGrid"></div>
        </div>
        <div id="chatContainer" class="chat-container">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">←</button>
                <div>
                    <h2 id="currentSceneName">场景名称</h2>
                    <p class="scene-name" id="currentSceneCode">场景编码</p>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入您的问题..." onkeypress="handleKeyPress(event)">
                    <button class="send-btn" onclick="sendMessage()">→</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
