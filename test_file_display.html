<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件显示测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        h1 { color: #333; }
        h2 { color: #666; margin-top: 20px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .warning { color: orange; font-weight: bold; }
        .info { color: blue; }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .file-display {
            margin-top: 10px;
        }
        .image-container {
            margin: 12px 0;
            text-align: center;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <h1>文件显示测试工具</h1>

    <div class="section">
        <h2>1. API连接测试</h2>
        <button onclick="testAPIConnection()">测试API连接</button>
        <div id="apiResult"></div>
    </div>

    <div class="section">
        <h2>2. 获取会话列表</h2>
        <button onclick="loadConversations()">获取会话列表</button>
        <div id="convListResult"></div>
    </div>

    <div class="section">
        <h2>3. 加载指定会话（使用你的会话ID）</h2>
        <input type="text" id="conversationId" value="conv_1773809745_a5e1017a" style="width: 300px; padding: 8px;">
        <button onclick="loadConversation()">加载会话</button>
        <div id="convResult"></div>
    </div>

    <div class="section">
        <h2>4. 测试文件下载API</h2>
        <input type="text" id="testFile" value="temperature_trend.png" style="width: 200px; padding: 8px;">
        <button onclick="testFileDownload()">测试下载</button>
        <div id="downloadResult"></div>
    </div>

    <div class="section">
        <h2>5. 测试文件列表API</h2>
        <input type="text" id="listConvId" value="conv_1773809745_a5e1017a" style="width: 300px; padding: 8px;">
        <button onclick="testFileList()">获取文件列表</button>
        <div id="fileListResult"></div>
    </div>

    <script>
        const API_BASE = '/api';

        async function testAPIConnection() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<div class="info">测试中...</div>';

            try {
                const response = await fetch(`${API_BASE}/conversations`);
                if (response.ok) {
                    resultDiv.innerHTML = '<div class="success">✅ API连接正常</div>';
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ API返回错误: ${response.status}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ API连接失败: ${error.message}</div>`;
            }
        }

        async function loadConversations() {
            const resultDiv = document.getElementById('convListResult');
            resultDiv.innerHTML = '<div class="info">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/conversations`);
                const data = await response.json();

                console.log('会话列表:', data);

                resultDiv.innerHTML = `
                    <div class="success">✅ 找到 ${data.length} 个会话</div>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 加载失败: ${error.message}</div>`;
            }
        }

        async function loadConversation() {
            const convId = document.getElementById('conversationId').value;
            const resultDiv = document.getElementById('convResult');
            resultDiv.innerHTML = '<div class="info">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/conversations/${convId}`);
                const conv = await response.json();

                console.log('会话数据:', conv);
                console.log('会话消息:', conv.messages);

                // 分析metadata
                let analysis = '';
                conv.messages.forEach((msg, idx) => {
                    if (msg.role === 'assistant') {
                        const hasMetadata = msg.metadata && Object.keys(msg.metadata).length > 0;
                        const hasFiles = msg.metadata && msg.metadata.files && msg.metadata.files.length > 0;

                        analysis += `<h3>消息 ${idx + 1} (Assistant)</h3>`;
                        analysis += `<div>- 有metadata: ${hasMetadata ? '✅' : '❌'}</div>`;
                        analysis += `<div>- 有files字段: ${msg.metadata && 'files' in (msg.metadata || {}) ? '✅' : '❌'}</div>`;
                        analysis += `<div>- files数组长度: ${hasFiles ? msg.metadata.files.length : 0}</div>`;

                        if (hasFiles) {
                            analysis += '<h4>文件列表:</h4><ul>';
                            msg.metadata.files.forEach(file => {
                                analysis += `<li>
                                    <strong>${file.filename}</strong><br>
                                    类型: ${file.type}<br>
                                    大小: ${file.size} 字节<br>
                                    路径: ${file.path}
                                </li>`;
                            });
                            analysis += '</ul>';
                        } else {
                            analysis += '<div class="warning">⚠️ 没有文件数据！</div>';
                        }

                        analysis += '<hr>';
                    }
                });

                resultDiv.innerHTML = `
                    <div class="success">✅ 会话加载成功</div>
                    <div class="info">会话ID: ${conv.conversation_id}</div>
                    <div class="info">消息数量: ${conv.messages.length}</div>
                    ${analysis}
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 加载失败: ${error.message}</div>`;
                console.error('加载失败:', error);
            }
        }

        async function testFileDownload() {
            const convId = document.getElementById('conversationId').value;
            const filename = document.getElementById('testFile').value;
            const resultDiv = document.getElementById('downloadResult');

            const url = `${API_BASE}/files/download/web_default_user/${convId}/${filename}`;

            resultDiv.innerHTML = `
                <div class="info">测试下载: ${url}</div>
                <div class="file-display">
                    <img src="${url}" alt="测试图片" style="max-width: 100%; border: 1px solid #ddd;">
                    <div class="info">图片源: ${url}</div>
                </div>
            `;

            console.log('下载URL:', url);
        }

        async function testFileList() {
            const convId = document.getElementById('listConvId').value;
            const resultDiv = document.getElementById('fileListResult');
            resultDiv.innerHTML = '<div class="info">获取中...</div>';

            try {
                const response = await fetch(`${API_BASE}/files/list/web_default_user/${convId}`);
                const data = await response.json();

                console.log('文件列表:', data);

                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">✅ 找到 ${data.count} 个文件</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ 获取失败: ${data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
                console.error('获取失败:', error);
            }
        }
    </script>
</body>
</html>
