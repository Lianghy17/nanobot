<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern模式续接测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .left-panel {
            flex: 1;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .right-panel {
            flex: 1;
            background: #e9ecef;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            max-height: 600px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-left: 3px solid #007bff;
        }
        .metadata {
            background: #fff3cd;
            padding: 5px;
            margin: 5px 0;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Pattern模式续接测试</h1>
    
    <div class="container">
        <div class="left-panel">
            <h2>操作面板</h2>
            
            <div class="status info">
                <strong>测试步骤：</strong>
                <ol>
                    <li>选择场景</li>
                    <li>点击模板</li>
                    <li>查看metadata</li>
                    <li>输入参数</li>
                    <li>检查continuing_pattern标记</li>
                </ol>
            </div>
            
            <h3>1. 选择场景</h3>
            <button onclick="selectScene()">选择"销售分析"场景</button>
            
            <h3>2. 选择模板</h3>
            <button onclick="clickTemplate()">点击"日销售趋势"模板</button>
            
            <h3>3. 输入参数</h3>
            <textarea id="userInput" rows="3" placeholder="输入参数，如：最近30天 按地区拆分"></textarea>
            <button onclick="sendWithParams()">发送参数</button>
            
            <div id="status"></div>
        </div>
        
        <div class="right-panel">
            <h2>调试日志</h2>
            <div id="logPanel"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8080';
        let currentConversation = null;
        let currentTemplate = null;
        let inTemplateMode = false;
        
        function log(message, type = 'info') {
            const panel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            panel.insertBefore(entry, panel.firstChild);
        }
        
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.className = `status ${type}`;
            status.textContent = message;
        }
        
        async function selectScene() {
            try {
                log('创建对话...');
                const response = await fetch(`${API_BASE}/conversations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scene_code: 'sales_analysis',
                        user_id: 'test_user'
                    })
                });
                
                const data = await response.json();
                currentConversation = data;
                log(`对话创建成功: ${data.conversation_id}`, 'success');
                showStatus(`对话创建成功: ${data.conversation_id}`, 'success');
            } catch (error) {
                log(`创建对话失败: ${error}`, 'error');
                showStatus(`创建对话失败: ${error}`, 'error');
            }
        }
        
        async function clickTemplate() {
            if (!currentConversation) {
                log('请先创建对话', 'error');
                showStatus('请先创建对话', 'error');
                return;
            }
            
            // 模拟模板数据
            currentTemplate = {
                id: 'daily_sales_trend',
                name: '日销售趋势',
                description: '查看指定时间范围内的每日销售额变化趋势'
            };
            
            inTemplateMode = true;
            
            log(`点击模板: ${currentTemplate.name}`, 'info');
            log(`设置 inTemplateMode = true`, 'info');
            log(`设置 currentTemplate = ${JSON.stringify(currentTemplate)}`, 'info');
            
            // 构建消息
            const prompt = `我想使用"${currentTemplate.name}"模板：${currentTemplate.description}\n\n请引导我填写参数。`;
            
            // 构建metadata
            const metadata = {
                template_mode: true,
                template_id: currentTemplate.id,
                template_name: currentTemplate.name,
                template_data: currentTemplate
            };
            
            log(`发送消息，metadata:`, 'info');
            log(`<div class="metadata">${JSON.stringify(metadata, null, 2)}</div>`, 'info');
            
            await sendMessage(prompt, metadata);
        }
        
        async function sendWithParams() {
            const input = document.getElementById('userInput').value;
            if (!input.trim()) {
                log('请输入参数', 'error');
                return;
            }
            
            log(`用户输入参数: ${input}`, 'info');
            log(`当前状态: inTemplateMode = ${inTemplateMode}, currentTemplate = ${currentTemplate?.name}`, 'info');
            
            // 构建metadata（应该包含continuing_pattern）
            let metadata = {};
            if (inTemplateMode && currentTemplate && !metadata.template_mode) {
                metadata.template_mode = true;
                metadata.template_id = currentTemplate.id;
                metadata.template_name = currentTemplate.name;
                metadata.continuing_pattern = true;
                
                log(`自动添加continuing_pattern标记`, 'info');
            } else {
                log(`警告: inTemplateMode=${inTemplateMode}, currentTemplate=${currentTemplate ? '存在' : 'null'}`, 'error');
            }
            
            log(`发送消息，metadata:`, 'info');
            log(`<div class="metadata">${JSON.stringify(metadata, null, 2)}</div>`, 'info');
            
            await sendMessage(input, metadata);
        }
        
        async function sendMessage(content, metadata) {
            try {
                log(`发送消息到后端...`, 'info');
                
                const response = await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversation_id: currentConversation.conversation_id,
                        content: content,
                        metadata: metadata
                    })
                });
                
                const result = await response.json();
                log(`消息发送成功: ${result.message_id}`, 'success');
                log(`消息状态: ${result.status}`, 'info');
                
                // 监听SSE事件
                setupSSE(currentConversation.conversation_id);
                
            } catch (error) {
                log(`发送消息失败: ${error}`, 'error');
                showStatus(`发送消息失败: ${error}`, 'error');
            }
        }
        
        function setupSSE(conversationId) {
            const eventSource = new EventSource(`${API_BASE}/sse/${conversationId}`);
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`SSE事件: ${data.event}`, 'info');
                
                if (data.event === 'intent_analyzed') {
                    log(`意图分析结果:`, 'info');
                    log(`  - intent_type: ${data.data.intent_type}`, 'info');
                    log(`  - matched_pattern: ${data.data.matched_pattern}`, 'info');
                    log(`  - confidence: ${data.data.confidence}`, 'info');
                    
                    if (data.data.intent_type === 'pattern_match') {
                        log(`✅ 成功匹配到Pattern!`, 'success');
                    } else {
                        log(`❌ 未匹配到Pattern，使用React模式`, 'error');
                    }
                }
                
                if (data.event === 'processing_completed') {
                    log(`处理完成:`, 'info');
                    log(`  - metadata: ${JSON.stringify(data.data.metadata, null, 2)}`, 'info');
                    
                    if (data.data.metadata.mode === 'react' && data.data.metadata.fallback_reason) {
                        log(`⚠️ 降级到React模式，原因: ${data.data.metadata.fallback_reason}`, 'error');
                    }
                }
                
                if (data.event === 'error') {
                    log(`错误: ${data.data.message}`, 'error');
                }
            };
            
            eventSource.onerror = (error) => {
                log(`SSE错误: ${error}`, 'error');
                eventSource.close();
            };
        }
    </script>
</body>
</html>
