<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QA模板系统测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .section { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 300px; }
        .template-panel {
            width: 320px;
            border: 2px solid #3498db;
            padding: 15px;
            margin-top: 10px;
            display: none;
        }
        .template-panel.active { display: block; }
        .template-item {
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border: 1px solid #ddd;
            cursor: pointer;
            border-radius: 5px;
        }
        .template-item:hover { background: #e8f4f8; }
        .category { margin-bottom: 15px; }
        .category-header { font-weight: bold; margin-bottom: 5px; color: #2c3e50; }
    </style>
</head>
<body>
    <h1>🧪 QA模板系统测试</h1>
    
    <div class="section">
        <h2>1. API连接测试</h2>
        <button onclick="testAPI()">测试API连接</button>
        <div id="apiResult"></div>
    </div>
    
    <div class="section">
        <h2>2. 加载场景QA模板</h2>
        <button onclick="loadSceneTemplates('sales_analysis')">销售分析</button>
        <button onclick="loadSceneTemplates('user_behavior')">用户行为</button>
        <button onclick="loadSceneTemplates('general_bi')">通用BI</button>
        <div id="loadResult"></div>
    </div>
    
    <div class="section">
        <h2>3. QA模板展示</h2>
        <div class="template-panel" id="templatePanel">
            <h3>📋 QA模板库</h3>
            <div id="templateList"></div>
        </div>
    </div>
    
    <div class="section">
        <h2>4. 调试日志</h2>
        <pre id="debugLog"></pre>
    </div>
    
    <script>
        const API_BASE = '/api';
        let qaTemplates = {};
        
        function log(msg, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            const debugLog = document.getElementById('debugLog');
            debugLog.textContent += `[${timestamp}] ${prefix} ${msg}\n`;
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(msg);
        }
        
        async function testAPI() {
            const apiResult = document.getElementById('apiResult');
            try {
                log('开始测试API连接...');
                const response = await fetch('/health');
                const data = await response.json();
                
                apiResult.innerHTML = `<div class="success">✅ API连接成功！<br><pre>${JSON.stringify(data, null, 2)}</pre></div>`;
                log('API连接测试成功', 'success');
            } catch (error) {
                apiResult.innerHTML = `<div class="error">❌ API连接失败: ${error.message}</div>`;
                log('API连接测试失败: ' + error.message, 'error');
            }
        }
        
        async function loadSceneTemplates(sceneCode) {
            const loadResult = document.getElementById('loadResult');
            log(`开始加载场景: ${sceneCode}`);
            
            try {
                const url = `${API_BASE}/qa/templates/${sceneCode}`;
                log(`请求URL: ${url}`);
                
                const response = await fetch(url);
                log(`响应状态: ${response.status} ${response.statusText}`);
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    qaTemplates = data;
                    renderTemplates(data);
                    document.getElementById('templatePanel').classList.add('active');
                    
                    const templateCount = data.templates ? data.templates.length : 0;
                    const categoryCount = Object.keys(data.categories || {}).length;
                    
                    loadResult.innerHTML = `<div class="success">✅ 加载成功！找到 ${templateCount} 个模板，${categoryCount} 个分类</div>`;
                    log(`场景 ${sceneCode} 加载成功: ${templateCount} 个模板, ${categoryCount} 个分类`, 'success');
                } else {
                    loadResult.innerHTML = `<div class="error">❌ 加载失败: ${JSON.stringify(data)}</div>`;
                    log(`加载失败: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                loadResult.innerHTML = `<div class="error">❌ 请求失败: ${error.message}</div>`;
                log(`请求失败: ${error.message}`, 'error');
                console.error(error);
            }
        }
        
        function renderTemplates(data) {
            const templateList = document.getElementById('templateList');
            
            if (!data.templates || data.templates.length === 0) {
                templateList.innerHTML = '<p>暂无QA模板</p>';
                log('没有找到QA模板', 'error');
                return;
            }
            
            log(`开始渲染 ${data.templates.length} 个模板`);
            
            const categories = data.categories || {};
            const templates = data.templates || [];
            
            if (Object.keys(categories).length > 0) {
                // 按分类渲染
                let html = '';
                for (const [categoryKey, categoryInfo] of Object.entries(categories)) {
                    const categoryTemplates = templates.filter(t => categoryInfo.templates.includes(t.id));
                    
                    if (categoryTemplates.length > 0) {
                        html += `<div class="category">
                            <div class="category-header">${categoryInfo.icon || '📁'} ${categoryKey} (${categoryTemplates.length}个模板)</div>
                            ${categoryTemplates.map(t => createTemplateItem(t)).join('')}
                        </div>`;
                        log(`渲染分类 "${categoryKey}": ${categoryTemplates.length} 个模板`);
                    }
                }
                templateList.innerHTML = html;
            } else {
                // 直接渲染所有模板
                templateList.innerHTML = templates.map(t => createTemplateItem(t)).join('');
            }
            
            log('模板渲染完成', 'success');
        }
        
        function createTemplateItem(template) {
            return `<div class="template-item" onclick="useTemplate('${template.id}')">
                <div><strong>${template.name || template.question_template}</strong></div>
                <div style="font-size: 12px; color: #666; margin-top: 3px;">${template.description || '暂无描述'}</div>
            </div>`;
        }
        
        function useTemplate(templateId) {
            log(`点击模板: ${templateId}`);
            alert(`使用模板ID: ${templateId}`);
        }
        
        // 页面加载时自动测试API
        window.onload = function() {
            log('页面加载完成');
            testAPI();
        };
    </script>
</body>
</html>
