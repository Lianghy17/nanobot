<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QA API测试</title>
</head>
<body>
    <h1>QA API测试</h1>
    <button onclick="loadSalesAnalysis()">加载销售分析模板</button>
    <button onclick="loadUserBehavior()">加载用户行为模板</button>
    <button onclick="loadGeneralBI()">加载通用BI模板</button>
    
    <h2>结果:</h2>
    <pre id="result"></pre>
    
    <script>
        async function loadSalesAnalysis() {
            const response = await fetch('/api/qa/templates/sales_analysis');
            const data = await response.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
        
        async function loadUserBehavior() {
            const response = await fetch('/api/qa/templates/user_behavior');
            const data = await response.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
        
        async function loadGeneralBI() {
            const response = await fetch('/api/qa/templates/general_bi');
            const data = await response.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
